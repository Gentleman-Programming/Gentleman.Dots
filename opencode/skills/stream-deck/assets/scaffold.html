<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DECK_TITLE | Modo Diapo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="ambient"></div>
    <div class="deck-app">
      <header class="topbar">
        <div>
          <p class="eyebrow">gentleman kanagawa blur · stream mode</p>
          <h1>DECK_TITLE</h1>
        </div>
        <div class="status">
          <span id="mode-badge" class="mode-badge">NORMAL</span>
          <span id="counter">01 / 01</span>
          <span class="hint">← → navegar · F focus</span>
        </div>
      </header>

      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress"></div>
      </div>

      <div class="stage-layout">
        <nav class="rail" aria-label="Modulos">
          <!-- MODULE_RAIL: one per module -->
          <div class="rail-module" data-module="0">
            <button class="rail-title" data-first="0">1. Module Name</button>
            <div class="rail-dots" id="dots-0"></div>
          </div>
        </nav>

        <main class="viewport" id="viewport">

          <!-- SLIDES: one article per slide -->
          <article class="slide" data-index="0" data-module="0" data-tone="blue">
            <div class="slide-content">
              <p class="slide-kicker">01 · MODULE NAME</p>
              <h2>Slide Title</h2>
              <p>Slide explanation text goes here.</p>
            </div>
            <figure class="slide-figure">
              <!-- INLINE SVG DIAGRAM -->
              <svg viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg"
                   font-family="Space Grotesk,sans-serif" fill="none"
                   role="img" aria-label="Diagram description">
                <text x="260" y="180" text-anchor="middle" font-size="14" fill="#A1AABB">
                  Diagram placeholder
                </text>
              </svg>
            </figure>
          </article>

        </main>
      </div>

      <footer class="deck-controls">
        <button type="button" id="prev" class="ghost">Anterior</button>
        <button type="button" id="next" class="solid">Siguiente</button>
      </footer>
    </div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
