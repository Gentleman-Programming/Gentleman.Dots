# agents.conf — tmux agent-state display layer.
# Installed to ~/.config/tmux/agents.conf by tmux-agents.nix and sourced at the END
# of tmux.conf (AFTER TPM/kanagawa load) so the per-tab dot can extend the theme's
# window-status-format instead of being overwritten by it.

# Per-tab dot — EXTENDS kanagawa's real format (preserves its colors/bg), only
# prepends a state dot in kanagawa's palette. red=#e82424 blocked, orange=#dca561 working.
set -g window-status-format         "#[fg=#dcd7ba]#[bg=#2a2a37] #{?#{==:#{@win_agent_state},blocked},#[fg=#e82424]●#[fg=#dcd7ba] ,#{?#{==:#{@win_agent_state},working},#[fg=#dca561]●#[fg=#dcd7ba] ,}}#I #W"
set -g window-status-current-format "#[fg=#dcd7ba,bg=#54546D] #{?#{==:#{@win_agent_state},blocked},#[fg=#e82424]●#[fg=#dcd7ba] ,#{?#{==:#{@win_agent_state},working},#[fg=#dca561]●#[fg=#dcd7ba] ,}}#I #W "

# Status-right informativo: which workspaces have agents needing attention.
set -g status-right "#(~/.config/tmux/scripts/agent-status.sh) "
set -g status-interval 2

# Visual punch when a window flips to blocked (works alongside the audible afplay).
set -g visual-bell on
set -g window-status-bell-style "fg=red,bold"
