# herdr configuration managed by Gentleman.Dots.
# This file is copied into ~/.config/herdr/config.toml during Home Manager activation.

[theme]
# Use a built-in dark theme with neutral foregrounds so Herdr does not inherit
# Ghostty bright-black selected rows or Kanagawa's warm/yellow label text.
name = "one-dark"

[theme.custom]
panel_bg = "#06080f"
# Match Pi's Gentle theme, with a muted cyan for Herdr chrome.
accent = "#6FA0AF"
green = "#B7CC85"
blue = "#6FA0AF"
red = "#CB7C94"
yellow = "#DEBA87"

[ui]
accent = "#6FA0AF"

[keys]
# Match tmux/Zellij-style prefix muscle memory.
prefix = "ctrl+a"

# Move between agents in the sidebar.
# Avoid Herdr's built-in prefix+shift+j/k pane-swap bindings.
previous_agent = "prefix+alt+k"
next_agent = "prefix+alt+j"

# Jump straight to agent N (1..9) as listed in the sidebar.
# Use Ctrl after the prefix: Alt+number is owned by skhd/yabai spaces,
# and Shift+number did not reach Herdr reliably in the current terminal setup.
focus_agent = "prefix+ctrl+1..9"
